server:
  port: 8080

spring:
  application:
    name: medical-gateway
  cloud:
    gateway:
      routes:
        - id: patient-service
          uri: lb://patient-service
          predicates:
            - Path=/api/patients/**
        - id: doctor-service
          uri: lb://doctor-service
          predicates:
            - Path=/api/v1/doctors/**
        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/api/v1/appointments/**,/api/v1/appointment,/api/v1/appointment/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
