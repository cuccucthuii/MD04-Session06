spring.application.name=doctor-service

server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/mic_session06db?currentSchema=doctordb
spring.datasource.username=postgres
spring.datasource.password=000000
spring.jpa.hibernate.ddl-auto=update

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Rate limiter — API tìm kiếm bác sĩ (chống cào dữ liệu)
resilience4j.ratelimiter.instances.searchDoctorLimit.limit-for-period=5

resilience4j.ratelimiter.instances.searchDoctorLimit.limit-refresh-period=10s

resilience4j.ratelimiter.instances.searchDoctorLimit.timeout-duration=0
